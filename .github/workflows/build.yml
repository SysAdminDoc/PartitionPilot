name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src\PartitionPilot\PartitionPilot.csproj

      - name: Build
        run: dotnet build src\PartitionPilot\PartitionPilot.csproj --no-restore -c Release

      - name: Test
        run: dotnet test tests\PartitionPilot.Tests\PartitionPilot.Tests.csproj --no-restore -c Release
