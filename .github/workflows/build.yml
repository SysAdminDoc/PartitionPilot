name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install CycloneDX tool
        run: dotnet tool install --global CycloneDX

      - name: Restore & Audit
        run: dotnet restore src\PartitionPilot\PartitionPilot.csproj --locked-mode && dotnet restore src\PartitionPilot.Cli\PartitionPilot.Cli.csproj --locked-mode && dotnet restore tests\PartitionPilot.Tests\PartitionPilot.Tests.csproj --locked-mode

      - name: Validate release metadata
        shell: pwsh
        run: |
          [xml]$project = Get-Content src\PartitionPilot\PartitionPilot.csproj
          $version = $project.Project.PropertyGroup.Version
          $installer = Get-Content installer\PartitionPilot.iss -Raw
          $readme = Get-Content README.md -Raw

          if ($installer -notmatch "AppVersion=$([regex]::Escape($version))") {
            throw "installer/PartitionPilot.iss AppVersion does not match project Version $version"
          }

          if ($installer -notmatch "OutputBaseFilename=PartitionPilot-$([regex]::Escape($version))-Setup") {
            throw "installer/PartitionPilot.iss OutputBaseFilename does not match project Version $version"
          }

          if ($readme -match 'partitionpilot-main-v\d') {
            throw "README.md points at a versioned screenshot path; use assets/screenshots/partitionpilot-main.png"
          }

      - name: Build
        run: dotnet build src\PartitionPilot\PartitionPilot.csproj --no-restore -c Release && dotnet build src\PartitionPilot.Cli\PartitionPilot.Cli.csproj --no-restore -c Release

      - name: Test
        run: dotnet test tests\PartitionPilot.Tests\PartitionPilot.Tests.csproj --no-restore -c Release

      - name: Publish GUI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish src\PartitionPilot\PartitionPilot.csproj -c Release -o ./publish/gui

      - name: Publish CLI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish src\PartitionPilot.Cli\PartitionPilot.Cli.csproj -c Release -o ./publish/cli

      - name: Generate SBOM
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          dotnet CycloneDX src\PartitionPilot\PartitionPilot.csproj -o ./publish -f sbom-gui.json -j
          dotnet CycloneDX src\PartitionPilot.Cli\PartitionPilot.Cli.csproj -o ./publish -f sbom-cli.json -j

      - name: Generate SHA256SUMS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $files = @(
            (Get-ChildItem ./publish/gui -File),
            (Get-ChildItem ./publish/cli -File),
            (Get-ChildItem ./publish -File -Filter 'sbom-*.json')
          ) | ForEach-Object { $_ }
          $hashes = $files | ForEach-Object {
            $rel = $_.FullName.Replace((Resolve-Path ./publish).Path + '\', '')
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $rel"
          }
          $hashes | Out-File -FilePath ./publish/SHA256SUMS -Encoding utf8

      - name: Upload build artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: PartitionPilot-publish
          path: ./publish/

      - name: Attest GUI provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest@v4
        with:
          subject-path: './publish/gui/PartitionPilot.exe'

      - name: Attest CLI provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest@v4
        with:
          subject-path: './publish/cli/pp.exe'

      - name: Attest SBOM provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest@v4
        with:
          subject-path: './publish/sbom-*.json'

      - name: Attest checksums provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest@v4
        with:
          subject-path: './publish/SHA256SUMS'
