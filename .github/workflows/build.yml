name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & Audit
        run: dotnet restore src\PartitionPilot\PartitionPilot.csproj --locked-mode && dotnet restore tests\PartitionPilot.Tests\PartitionPilot.Tests.csproj --locked-mode

      - name: Validate release metadata
        shell: pwsh
        run: |
          [xml]$project = Get-Content src\PartitionPilot\PartitionPilot.csproj
          $version = $project.Project.PropertyGroup.Version
          $installer = Get-Content installer\PartitionPilot.iss -Raw
          $readme = Get-Content README.md -Raw

          if ($installer -notmatch "AppVersion=$([regex]::Escape($version))") {
            throw "installer/PartitionPilot.iss AppVersion does not match project Version $version"
          }

          if ($installer -notmatch "OutputBaseFilename=PartitionPilot-$([regex]::Escape($version))-Setup") {
            throw "installer/PartitionPilot.iss OutputBaseFilename does not match project Version $version"
          }

          if ($readme -match 'partitionpilot-main-v\d') {
            throw "README.md points at a versioned screenshot path; use assets/screenshots/partitionpilot-main.png"
          }

      - name: Build
        run: dotnet build src\PartitionPilot\PartitionPilot.csproj --no-restore -c Release

      - name: Test
        run: dotnet test tests\PartitionPilot.Tests\PartitionPilot.Tests.csproj --no-restore -c Release

      - name: Publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish src\PartitionPilot\PartitionPilot.csproj -c Release -o ./publish

      - name: Generate SHA256SUMS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $hashes = Get-ChildItem ./publish -File | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          }
          $hashes | Out-File -FilePath ./publish/SHA256SUMS -Encoding utf8

      - name: Upload build artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: PartitionPilot-publish
          path: ./publish/

      - name: Attest build provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest@v4
        with:
          subject-path: './publish/PartitionPilot.exe'
